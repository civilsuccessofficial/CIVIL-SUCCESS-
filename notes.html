<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Civil Success Notes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
}

header{
background:linear-gradient(135deg,#0d47a1,#1565c0);
padding:35px 20px;
color:white;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

header h1{
font-size:34px;
font-weight:700;
}

header p{
margin-top:8px;
opacity:.9;
font-size:16px;
}

.search-box{
max-width:700px;
margin:25px auto;
padding:0 15px;
}

.search-box input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
outline:none;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.section-title{
font-size:24px;
font-weight:700;
margin-bottom:18px;
color:#0d47a1;
}

.subject-card{

display:flex;
justify-content:space-between;
align-items:center;

background:white;

padding:18px;

margin-bottom:15px;

border-radius:14px;

text-decoration:none;

color:#222;

box-shadow:0 5px 15px rgba(0,0,0,.08);

transition:.3s;

}

.subject-card:hover{

transform:translateY(-4px);

}

.left{

display:flex;

align-items:center;

gap:15px;

}

.icon{

font-size:30px;

}

.subject-name{

font-size:19px;

font-weight:600;

}

.arrow{

font-size:28px;

color:#1565c0;

}

.star{

color:#ff9800;

margin-right:5px;

}
  </style>

</head>

<body>

<header>

<h1>📚 Civil Success Notes</h1>

<p>SSC JE • RRB JE • Civil Engineering</p>

</header>

<div class="search-box">

<input
type="text"
id="search"
placeholder="🔍 Search Subject...">

</div>

<div class="container">

<h2 class="section-title">
⭐ SSC JE Subjects
</h2>

<a href="ssc-je.html" class="subject-card">
<div class="left">
<div class="icon">🏗️</div>
<div class="subject-name">
SSC JE Civil Engineering
</div>
</div>
<div class="arrow">›</div>
</a>

<a href="rrb-je.html" class="subject-card">
<div class="left">
<div class="icon">🚆</div>
<div class="subject-name">
RRB JE Civil Engineering
</div>
</div>
<div class="arrow">›</div>
</a>

<h2 class="section-title" style="margin-top:35px;">
📖 More Sections
</h2>

<a href="mcq.html" class="subject-card">
<div class="left">
<div class="icon">❓</div>
<div class="subject-name">
Topic Wise MCQs
</div>
</div>
<div class="arrow">›</div>
</a>

<a href="test.html" class="subject-card">
<div class="left">
<div class="icon">🧪</div>
<div class="subject-name">
Mock Tests
</div>
</div>
<div class="arrow">›</div>
</a>

<a href="pyq.html" class="subject-card">
<div class="left">
<div class="icon">📄</div>
<div class="subject-name">
Previous Year Papers
</div>
</div>
<div class="arrow">›</div>
</a>

</div>

<script>

const search=document.getElementById("search");

search.addEventListener("keyup",function(){

let value=this.value.toLowerCase();

let cards=document.querySelectorAll(".subject-card");

cards.forEach(card=>{

let text=card.innerText.toLowerCase();

card.style.display=text.includes(value)?"flex":"none";

});

});

</script>

</body>

</html>
